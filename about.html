<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <nav>

      <a href="/" class="logo">cynthia</a>

  <section style="border-top: none; padding-bottom: 40px;">

      <p class="section-label">my story</p>
    </div>
    <div id="story-graph" class="story-graph-wrap"></div>

        </div>
        <div class="node-panel-body"></div>
      </div>
    </div>
  </section>
